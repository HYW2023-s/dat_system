<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理面板 - DAT System</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
  <script src="/js/api.js"></script>
</head>
<body>
  <nav id="navbar" class="navbar"></nav>

  <div class="page-container" style="padding-top:2rem;padding-bottom:3rem">
    <h1 style="margin-bottom:2rem"><i class="ph ph-gear"></i> 管理面板</h1>

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem">
      <a href="/admin/upload-user" class="card" style="text-decoration:none;transition:all 0.15s ease;cursor:pointer">
        <div style="font-size:2rem;color:var(--accent);margin-bottom:0.75rem">
          <i class="ph ph-upload"></i>
        </div>
        <h2 style="font-size:1.125rem;margin-bottom:0.25rem">批量上传用户</h2>
        <p class="text-sm text-muted">通过 Excel 文件批量导入用户账号</p>
      </a>

      <a href="/admin/task-config" class="card" style="text-decoration:none;transition:all 0.15s ease;cursor:pointer">
        <div style="font-size:2rem;color:var(--accent);margin-bottom:0.75rem">
          <i class="ph ph-clock"></i>
        </div>
        <h2 style="font-size:1.125rem;margin-bottom:0.25rem">任务时间配置</h2>
        <p class="text-sm text-muted">修改 DAT 测试的限制时间</p>
      </a>

      <a href="/analysis" class="card" style="text-decoration:none;transition:all 0.15s ease;cursor:pointer">
        <div style="font-size:2rem;color:var(--accent);margin-bottom:0.75rem">
          <i class="ph ph-chart-bar"></i>
        </div>
        <h2 style="font-size:1.125rem;margin-bottom:0.25rem">数据分析</h2>
        <p class="text-sm text-muted">查看所有用户 DAT 得分统计分析</p>
      </a>

      <div class="card" style="cursor:pointer" onclick="exportCSV()">
        <div style="font-size:2rem;color:var(--accent);margin-bottom:0.75rem">
          <i class="ph ph-file-csv"></i>
        </div>
        <h2 style="font-size:1.125rem;margin-bottom:0.25rem">导出数据 CSV</h2>
        <p class="text-sm text-muted">导出所有作答记录为 CSV 文件</p>
      </div>

      <div class="card" style="cursor:pointer" onclick="exportXLSX()">
        <div style="font-size:2rem;color:var(--accent);margin-bottom:0.75rem">
          <i class="ph ph-file-xls"></i>
        </div>
        <h2 style="font-size:1.125rem;margin-bottom:0.25rem">导出数据 Excel</h2>
        <p class="text-sm text-muted">导出所有作答记录为 Excel 文件</p>
      </div>

      <a href="/model-config" class="card" style="text-decoration:none;cursor:pointer">
        <div style="font-size:2rem;color:var(--accent);margin-bottom:0.75rem">
          <i class="ph ph-cpu"></i>
        </div>
        <h2 style="font-size:1.125rem;margin-bottom:0.25rem">Embedding 模型</h2>
        <p class="text-sm text-muted">配置和切换词向量计算模型</p>
      </a>

      <div class="card" style="cursor:pointer" onclick="showPasswordModal()">
        <div style="font-size:2rem;color:var(--accent);margin-bottom:0.75rem">
          <i class="ph ph-lock-key"></i>
        </div>
        <h2 style="font-size:1.125rem;margin-bottom:0.25rem">修改密码</h2>
        <p class="text-sm text-muted">修改当前用户的登录密码</p>
      </div>
    </div>

    <!-- Password Change Modal -->
    <div id="passwordModal" class="modal-overlay" style="display:none">
      <div class="modal">
        <h2 style="margin-bottom:1rem">修改密码</h2>
        <form id="passwordForm">
          <div class="form-group">
            <label class="form-label">旧密码</label>
            <input type="password" id="oldPassword" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label">新密码</label>
            <input type="password" id="newPassword" class="form-input" required minlength="6">
          </div>
          <div class="form-group">
            <label class="form-label">确认新密码</label>
            <input type="password" id="confirmNewPassword" class="form-input" required minlength="6">
          </div>
          <div id="pwdError" class="alert alert-error" style="display:none"></div>
          <div style="display:flex;gap:0.75rem;justify-content:flex-end">
            <button type="button" class="btn btn-secondary" onclick="hidePasswordModal()">取消</button>
            <button type="submit" class="btn btn-primary">确认修改</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    if (!requireAdmin()) {}

    renderNavbar("admin");

    function exportCSV() {
      window.open("/api/export/csv", "_blank");
      showToast("正在导出 CSV...", "info");
    }

    function exportXLSX() {
      window.open("/api/export/xlsx", "_blank");
      showToast("正在导出 Excel...", "info");
    }

    function showPasswordModal() {
      document.getElementById("passwordModal").style.display = "flex";
    }

    function hidePasswordModal() {
      document.getElementById("passwordModal").style.display = "none";
    }

    document.getElementById("passwordForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const oldPassword = document.getElementById("oldPassword").value;
      const newPassword = document.getElementById("newPassword").value;
      const confirmNewPassword = document.getElementById("confirmNewPassword").value;
      const errorEl = document.getElementById("pwdError");

      if (newPassword !== confirmNewPassword) {
        errorEl.textContent = "两次输入的新密码不一致";
        errorEl.style.display = "block";
        return;
      }

      try {
        errorEl.style.display = "none";
        await apiPost("/auth/change-password", {
          old_password: oldPassword,
          new_password: newPassword,
        });
        hidePasswordModal();
        showToast("密码修改成功", "success");
        document.getElementById("passwordForm").reset();
      } catch (err) {
        errorEl.textContent = err.message || "修改失败";
        errorEl.style.display = "block";
      }
    });

    document.getElementById("passwordModal").addEventListener("click", (e) => {
      if (e.target.id === "passwordModal") hidePasswordModal();
    });
  </script>
</body>
</html>
