<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title data-i18n="taskconfig.title">任务配置 - DAT System</title>
<link rel="stylesheet" href="/css/style.css"><script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script><script src="/js/i18n.js"></script><script src="/js/api.js"></script></head>
<body><nav id="navbar" class="navbar"></nav>
<div class="page-container" style="padding-top:2rem;padding-bottom:3rem;max-width:460px;margin:0 auto">
<a href="/admin" class="btn btn-ghost mb-4" style="padding:0.375rem 0.625rem"><i class="ph ph-arrow-left"></i> <span data-i18n="taskconfig.back">返回</span></a>
<h1 style="margin-bottom:1.5rem" data-i18n="taskconfig.title">任务时间配置</h1>
<div class="card"><h2 class="card-header" data-i18n="taskconfig.title">任务时间配置</h2>
<form id="configForm"><div class="form-group"><label class="form-label" for="limitedTime" data-i18n="taskconfig.limited_time">限制时间（秒）</label><input type="number" id="limitedTime" class="form-input" min="10" max="3600" required><p class="form-hint" data-i18n="taskconfig.hint">建议 60-600 秒，默认 240 秒（4分钟）</p></div>
<div id="configError" class="alert alert-error" style="display:none"></div><div id="configSuccess" class="alert alert-success" style="display:none"></div>
<button type="submit" class="btn btn-primary" data-i18n="common.save">保存</button></form></div></div>
<script>if(!requireAdmin()){}
async function init(){renderNavbar("admin");applyI18n();try{const d=await apiGet("/dat/limited-time");document.getElementById("limitedTime").value=d.limited_time;}catch(e){}}
document.getElementById("configForm").addEventListener("submit",async(e)=>{e.preventDefault();const t=parseInt(document.getElementById("limitedTime").value),err=document.getElementById("configError"),ok=document.getElementById("configSuccess");if(t<10||t>3600){err.textContent=t("taskconfig.error_range");err.style.display="block";return;}err.style.display="none";ok.style.display="none";try{await apiPut("/admin/task-time",{limited_time:t});ok.textContent=t("taskconfig.saved")+t+" 秒（"+Math.floor(t/60)+"分"+t%60+"秒）";ok.style.display="block";}catch(ex){err.textContent=ex.message;err.style.display="block";}});
init();</script></body></html>
