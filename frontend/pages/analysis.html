<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据分析 - DAT System</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <script src="/js/api.js"></script>
</head>
<body>
  <nav id="navbar" class="navbar"></nav>

  <div class="page-container" style="padding-top:2rem;padding-bottom:3rem">
    <h1 style="margin-bottom:2rem"><i class="ph ph-chart-bar"></i> 数据分析</h1>

    <!-- Stats Cards -->
    <div id="statsCards" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:2rem"></div>

    <!-- Charts -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem">
      <div class="card">
        <h2 class="card-header">得分分布</h2>
        <div id="barChart" style="height:350px"></div>
      </div>
      <div class="card">
        <h2 class="card-header">箱型图</h2>
        <div id="boxChart" style="height:350px"></div>
      </div>
    </div>
  </div>

  <script>
    if (!requireAdmin()) {}

    async function init() {
      renderNavbar("analysis");

      try {
        const data = await apiGet("/admin/analysis");
        renderStats(data.stats);
        renderCharts(data.distribution, data.boxplot_data);
      } catch (err) {
        document.querySelector(".page-container").innerHTML = `
          <div class="alert alert-error">加载失败：${err.message}</div>
        `;
      }
    }

    function renderStats(stats) {
      const cards = [
        { label: "样本数", value: stats.count, icon: "users" },
        { label: "平均分", value: stats.avg, icon: "target" },
        { label: "最高分", value: stats.max, icon: "arrow-up" },
        { label: "最低分", value: stats.min, icon: "arrow-down" },
        { label: "中位数", value: stats.median, icon: "stack" },
        { label: "标准差", value: stats.std, icon: "waveform" },
      ];

      document.getElementById("statsCards").innerHTML = cards.map(c => `
        <div class="card" style="text-align:center">
          <div class="score-label">${c.label}</div>
          <div style="font-size:1.75rem;font-weight:700;color:var(--text-primary);margin:0.25rem 0">${c.value}</div>
        </div>
      `).join("");
    }

    function renderCharts(distribution, boxplotData) {
      // Bar chart
      const barDom = document.getElementById("barChart");
      const barChart = echarts.init(barDom);
      barChart.setOption({
        tooltip: { trigger: "axis" },
        grid: { left: "3%", right: "4%", bottom: "3%", containLabel: true },
        xAxis: { type: "category", data: Object.keys(distribution) },
        yAxis: { type: "value" },
        series: [{ data: Object.values(distribution), type: "bar", itemStyle: { color: "#4f46e5" } }],
      });

      // Box chart
      const boxDom = document.getElementById("boxChart");
      const boxChart = echarts.init(boxDom);
      boxChart.setOption({
        tooltip: { trigger: "item" },
        grid: { left: "3%", right: "4%", bottom: "3%", containLabel: true },
        xAxis: { type: "category", data: ["DAT 得分"] },
        yAxis: { type: "value", name: "Score" },
        series: [{
          type: "boxplot",
          data: [boxplotData.scores],
          itemStyle: { color: "#4f46e5" },
        }],
      });

      window.addEventListener("resize", () => {
        barChart.resize();
        boxChart.resize();
      });
    }

    init();
  </script>
</body>
</html>
