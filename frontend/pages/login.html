<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - DAT System</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
</head>
<body>
  <div style="min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:1.5rem">
    <div class="card" style="width:100%;max-width:400px">
      <div style="text-align:center;margin-bottom:2rem">
        <div style="font-size:2.5rem;color:var(--accent);margin-bottom:0.5rem">
          <i class="ph ph-brain"></i>
        </div>
        <h1 style="font-size:1.5rem">DAT System</h1>
        <p class="text-muted text-sm mt-2">发散性思维测试系统</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="username">用户名</label>
          <input
            type="text"
            id="username"
            class="form-input"
            placeholder="请输入用户名"
            required
            autocomplete="username"
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">密码</label>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="请输入密码"
            required
            autocomplete="current-password"
          >
        </div>

        <div id="errorMsg" class="alert alert-error" style="display:none"></div>

        <button type="submit" class="btn btn-primary" style="width:100%">
          <i class="ph ph-sign-in"></i> 登录
        </button>
      </form>

      <p class="text-center text-sm text-muted mt-4">
        没有账号？<a href="/register">立即注册</a>
      </p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    if (isLoggedIn()) {
      window.location.href = "/test";
    }

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const errorMsg = document.getElementById("errorMsg");

      if (!username || !password) {
        errorMsg.textContent = "请输入用户名和密码";
        errorMsg.style.display = "block";
        return;
      }

      try {
        errorMsg.style.display = "none";
        const btn = e.target.querySelector("button");
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> 登录中...';

        await login(username, password);
        window.location.href = "/test";
      } catch (err) {
        errorMsg.textContent = err.message || "登录失败，请检查用户名和密码";
        errorMsg.style.display = "block";
        const btn = e.target.querySelector("button");
        btn.disabled = false;
        btn.innerHTML = '<i class="ph ph-sign-in"></i> 登录';
      }
    });
  </script>
</body>
</html>
