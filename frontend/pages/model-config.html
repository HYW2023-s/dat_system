<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title data-i18n="modelconfig.title">模型配置 - DAT System</title>
<link rel="stylesheet" href="/css/style.css"><script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script><script src="/js/i18n.js"></script><script src="/js/api.js"></script></head>
<body><nav id="navbar" class="navbar"></nav>
<div class="page-container" style="padding-top:2rem;padding-bottom:3rem;max-width:680px;margin:0 auto">
<a href="/admin" class="btn btn-ghost mb-4" style="padding:0.375rem 0.625rem"><i class="ph ph-arrow-left"></i> <span data-i18n="modelconfig.back">返回</span></a>
<h1 data-i18n="modelconfig.title" style="margin-bottom:1.5rem">Embedding 模型配置</h1>

<div class="card mb-4"><h2 class="card-header" data-i18n="modelconfig.current">当前模型</h2><div id="currentInfo"><div class="spinner"></div></div></div>

<div class="card mb-4"><h2 class="card-header" data-i18n="modelconfig.active">已激活的模型</h2>
<div id="activeList"><span class="text-muted text-sm" data-i18n="modelconfig.active_empty">暂无已激活的 API 模型</span></div></div>

<div class="card mb-4"><h2 class="card-header" data-i18n="modelconfig.templates">内置模型模板</h2>
<p class="text-sm text-muted mb-4" data-i18n="modelconfig.templates_hint">选择一个模型并填入 API Key 即可激活使用。</p>
<div id="templateList"><span class="text-muted text-sm"></span></div></div>

<div class="card mb-4"><h2 class="card-header" data-i18n="modelconfig.custom_title">添加自定义模型</h2>
<p class="text-sm text-muted mb-4" data-i18n="modelconfig.custom_hint">支持任何兼容 OpenAI API 格式的 Embedding 服务。</p>
<form id="customForm"><div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem">
<div class="form-group"><label class="form-label" data-i18n="modelconfig.custom_name">显示名称</label><input id="cName" class="form-input" data-i18n-placeholder="modelconfig.custom_name_ph" placeholder="如：我的模型" required></div>
<div class="form-group"><label class="form-label" data-i18n="modelconfig.custom_dim">向量维度</label><input id="cDim" type="number" class="form-input" data-i18n-placeholder="modelconfig.custom_dim_ph" placeholder="如：1536" min="1" max="8192" required></div></div>
<div class="form-group"><label class="form-label" data-i18n="modelconfig.custom_url">API 地址</label><input id="cUrl" class="form-input" data-i18n-placeholder="modelconfig.custom_url_ph" placeholder="https://api.example.com/v1" required></div>
<div class="form-group"><label class="form-label" data-i18n="modelconfig.custom_model_id">模型 ID</label><input id="cModel" class="form-input" data-i18n-placeholder="modelconfig.custom_model_id_ph" placeholder="model-name" required></div>
<div class="form-group"><label class="form-label" data-i18n="modelconfig.custom_key">API Key</label><input type="password" id="cKey" class="form-input" data-i18n-placeholder="modelconfig.custom_key_ph" placeholder="sk-..." required></div>
<div id="customMsg" style="display:none" class="mb-4"></div>
<button type="submit" class="btn btn-primary" data-i18n="modelconfig.custom_submit">添加模型</button></form></div>

<div class="card"><h2 class="card-header" data-i18n="modelconfig.cache_title">向量缓存</h2><div id="cacheStats"><span class="text-muted text-sm"></span></div></div></div>

<script>if(!requireAdmin()){}
async function init(){renderNavbar("admin");applyI18n();await refresh();await loadCache();}
async function refresh(){try{const d=await apiGet("/models");renderCurrent(d);renderActive(d);renderTemplates(d);}catch(e){showToast(t("modelconfig.load_failed"),"error");}}
function renderCurrent(d){const m=d.models.find(x=>x.name===d.active_model);document.getElementById("currentInfo").innerHTML=m?'<div style="font-size:1.0625rem;font-weight:600">'+m.description+'</div><div class="text-sm text-muted mt-2">'+m.dimension+t("taskconfig.seconds")+' · '+(m.is_local?t("modelconfig.local"):t("modelconfig.api"))+'</div>':'<span class="text-muted">-</span>';}
function renderActive(d){const api=d.models.filter(m=>!m.is_local);document.getElementById("activeList").innerHTML=api.length===0?'<span class="text-muted text-sm">'+t("modelconfig.active_empty")+'</span>':api.map(m=>'<div style="display:flex;align-items:center;justify-content:space-between;padding:0.625rem 0;border-bottom:1px solid var(--border-light)"><div><strong>'+m.description+'</strong><br><span class="text-sm text-muted">'+m.dimension+t("taskconfig.seconds")+'</span></div><div style="display:flex;gap:0.375rem">'+(m.is_active?'<span style="background:var(--accent-light);color:var(--accent);padding:0.25rem 0.625rem;border-radius:var(--radius-md);font-size:0.8125rem">'+t("modelconfig.current_tag")+'</span>':'<button class="btn btn-ghost" style="font-size:0.8125rem;padding:0.25rem 0.625rem" onclick="switchTo(\''+m.name+'\')">'+t("modelconfig.switch_btn")+'</button>')+'<button class="btn btn-ghost" style="font-size:0.75rem;color:var(--error);padding:0.25rem" onclick="removeProvider(\''+m.name+'\')"><i class="ph ph-trash"></i></button></div></div>').join("");}
function renderTemplates(d){const tpls=d.templates||[],an=new Set(d.models.map(m=>m.name));document.getElementById("templateList").innerHTML=tpls.map(tm=>'<div style="display:flex;align-items:center;justify-content:space-between;padding:0.625rem 0;border-bottom:1px solid var(--border-light)"><div><strong>'+tm.description+'</strong><br><span class="text-sm text-muted">'+tm.dimension+t("taskconfig.seconds")+(an.has(tm.name)?' · '+t("modelconfig.activated"):'')+'</span></div>'+(an.has(tm.name)?'<span style="background:var(--bg-warm);color:var(--text-secondary);padding:0.25rem 0.625rem;border-radius:var(--radius-md);font-size:0.8125rem">'+t("modelconfig.activated")+'</span>':'<button class="btn btn-secondary" style="font-size:0.8125rem;padding:0.25rem 0.625rem" onclick="showKeyPrompt(\''+(tm.kind||tm.name)+'\',\''+tm.description+'\')">'+t("modelconfig.activate_btn")+'</button>')+'</div>').join("");}
async function switchTo(name){try{const r=await apiPost("/models/switch",{model_name:name});showToast(r.message,"success");await refresh();}catch(e){showToast(e.message,"error");}}
function showKeyPrompt(kind,desc){const key=prompt(t("modelconfig.prompt_title")+"\n"+desc+"\n\nAPI Key：");if(!key)return;activateModel(kind,key);}
async function activateModel(kind,key){try{const r=await apiPost("/models/activate",{model_name:kind,api_key:key});showToast(r.message,"success");await refresh();}catch(e){showToast(e.message,"error");}}
async function removeProvider(name){if(!confirm(t("modelconfig.delete_confirm")+' "'+name+'"'+t("modelconfig.delete_confirm_suffix")))return;try{const r=await apiPost("/models/delete",{model_name:name});showToast(r.message,"success");await refresh();}catch(e){showToast(e.message,"error");}}
document.getElementById("customForm").addEventListener("submit",async(e)=>{e.preventDefault();const n=document.getElementById("cName").value.trim(),u=document.getElementById("cUrl").value.trim(),mid=document.getElementById("cModel").value.trim(),dim=parseInt(document.getElementById("cDim").value),key=document.getElementById("cKey").value.trim(),msg=document.getElementById("customMsg");try{const r=await apiPost("/models/custom",{name:n,base_url:u,model_id:mid,dimension:dim,api_key:key});msg.className="alert alert-success";msg.textContent=r.message;msg.style.display="block";document.getElementById("customForm").reset();await refresh();}catch(ex){msg.className="alert alert-error";msg.textContent=ex.message;msg.style.display="block";}});
async function loadCache(){try{const s=await apiGet("/models/cache-stats");document.getElementById("cacheStats").innerHTML=Object.keys(s).length===0?'<span class="text-muted text-sm" data-i18n="modelconfig.cache_empty">'+t("modelconfig.cache_empty")+'</span>':Object.entries(s).map(([n,c])=>'<div style="padding:0.375rem 0;border-bottom:1px solid var(--border-light)">'+n+'：<strong>'+c+'</strong>'+t("modelconfig.cache_entry")+'</div>').join("");}catch(e){}}
init();</script></body></html>
