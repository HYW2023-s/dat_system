<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模型配置 - DAT System</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
  <script src="/js/api.js"></script>
</head>
<body>
  <nav id="navbar" class="navbar"></nav>
  <div class="page-container" style="padding-top:2rem;padding-bottom:3rem;max-width:600px;margin:0 auto">
    <a href="/admin" class="btn btn-ghost mb-4" style="padding:0.375rem 0.625rem"><i class="ph ph-arrow-left"></i> 返回</a>
    <h1 style="margin-bottom:1.5rem">Embedding 模型配置</h1>

    <div class="card mb-4">
      <h2 class="card-header">当前模型</h2>
      <div id="currentModelInfo"><div class="spinner"></div></div>
    </div>

    <div class="card mb-4">
      <h2 class="card-header">可用模型</h2>
      <div id="modelsList"><div class="spinner" style="margin:1rem auto"></div></div>
    </div>

    <div class="card mb-4">
      <h2 class="card-header">API Key 配置</h2>
      <p class="text-sm text-muted mb-4">API Key 仅用于调用外部 Embedding 服务。</p>
      <div class="form-group"><label class="form-label">模型</label><select id="apikeyModel" class="form-input"><option value="ali-qwen-v4">阿里百炼 text-embedding-v4</option></select></div>
      <div class="form-group"><label class="form-label" for="apiKey">API Key</label><input type="password" id="apiKey" class="form-input" placeholder="输入 API Key" autocomplete="off"></div>
      <div id="apiKeyError" class="alert alert-error" style="display:none"></div>
      <div id="apiKeySuccess" class="alert alert-success" style="display:none"></div>
      <button class="btn btn-primary" onclick="saveApiKey()">保存</button>
    </div>

    <div class="card">
      <h2 class="card-header">向量缓存</h2>
      <p class="text-sm text-muted mb-4">通过 API 获取的词向量会自动缓存到本地。</p>
      <div id="cacheStats"><span class="text-muted text-sm">加载中...</span></div>
    </div>
  </div>

  <script>
    if (!requireAdmin()) {}
    async function init(){renderNavbar("admin");await loadModels();await loadCacheStats();}
    async function loadModels(){
      try{
        const d=await apiGet("/models");
        const active=d.models.find(m=>m.name===d.active_model);
        document.getElementById("currentModelInfo").innerHTML=active?`
          <div style="font-size:1.125rem;font-weight:600">${active.description}</div>
          <div class="text-sm text-muted mt-2">${active.dimension}维 &nbsp;·&nbsp; ${active.is_local?'本地运行':'API调用'}</div>
        `:`<span class="text-muted">未选择</span>`;
        document.getElementById("modelsList").innerHTML=d.models.map(m=>`
          <div style="display:flex;align-items:center;justify-content:space-between;padding:0.75rem 0;border-bottom:1px solid var(--border-light)">
            <div><strong>${m.description}</strong><div class="text-sm text-muted mt-2">${m.dimension}维 · ${m.is_local?'本地':'API'}</div></div>
            ${m.name===d.active_model?`<span style="background:var(--accent-light);color:var(--accent);padding:0.375rem 0.75rem;border-radius:var(--radius-md);font-size:0.8125rem;font-weight:500">当前使用</span>`:`<button class="btn btn-secondary" onclick="switchModel('${m.name}')" style="padding:0.25rem 0.625rem;font-size:0.8125rem">切换</button>`}
          </div>
        `).join("");
      }catch(e){showToast("加载失败","error");}
    }
    async function switchModel(n){try{await apiPost("/models/switch",{model_name:n});showToast("已切换","success");await loadModels();}catch(e){showToast(e.message,"error");}}
    async function saveApiKey(){
      const m=document.getElementById("apikeyModel").value,k=document.getElementById("apiKey").value.trim(),err=document.getElementById("apiKeyError"),ok=document.getElementById("apiKeySuccess");
      if(!k){err.textContent="请输入API Key";err.style.display="block";ok.style.display="none";return;}
      try{err.style.display="none";ok.style.display="none";const r=await apiPost("/models/apikey",{model_name:m,api_key:k});ok.textContent=r.message;ok.style.display="block";document.getElementById("apiKey").value="";await loadModels();}catch(ex){err.textContent=ex.message;err.style.display="block";ok.style.display="none";}
    }
    async function loadCacheStats(){
      try{const s=await apiGet("/models/cache-stats");document.getElementById("cacheStats").innerHTML=Object.keys(s).length===0?'<span class="text-muted text-sm">缓存为空</span>':Object.entries(s).map(([n,c])=>`<div style="padding:0.5rem 0;border-bottom:1px solid var(--border-light)">${n}：<strong>${c}</strong> 个词向量已缓存</div>`).join("");}catch(e){}
    }
    init();
  </script>
</body>
</html>
