<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title data-i18n="results.title">结果查询 - DAT System</title>
<link rel="stylesheet" href="/css/style.css"><script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script><script src="/js/i18n.js"></script><script src="/js/api.js"></script></head>
<body><nav id="navbar" class="navbar"></nav>
<div class="page-container" style="padding-top:2rem;padding-bottom:3rem">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem"><h1 data-i18n="results.title">作答记录</h1><a href="/test" class="btn btn-primary" data-i18n="results.new_test">新建测试</a></div>
<div id="searchBox" class="card mb-4" style="display:none;padding:1rem"><div style="display:flex;gap:0.5rem;max-width:360px"><input type="text" id="searchInput" class="form-input" data-i18n-placeholder="results.search_placeholder" placeholder="搜索用户名..."><button class="btn btn-secondary" onclick="searchRecords()" data-i18n="results.search_btn">搜索</button></div></div>
<div class="table-container"><table><thead><tr><th data-i18n="results.th_id">ID</th><th data-i18n="results.th_username">用户名</th><th data-i18n="results.th_time">时间</th><th data-i18n="results.th_score">得分</th><th data-i18n="results.th_valid">有效词</th><th></th></tr></thead><tbody id="tableBody"><tr><td colspan="6" style="text-align:center;padding:2.5rem"><div class="spinner" style="margin:0 auto"></div></td></tr></tbody></table></div>
<div id="pagination" class="pagination"></div><div id="emptyState" class="empty-state" style="display:none"><i class="ph ph-clipboard-text"></i><p data-i18n="results.empty">暂无作答记录</p><a href="/test" class="btn btn-primary mt-4" data-i18n="results.start_first">开始第一次测试</a></div></div>
<script>
let currentPage=1,totalPages=1,searchQuery="";if(!requireAuth()){}
async function init(){renderNavbar("results");applyI18n();if(getUserInfo().isSuperuser)document.getElementById("searchBox").style.display="block";await loadResults();}
async function loadResults(){const tbody=document.getElementById("tableBody");tbody.innerHTML='<tr><td colspan="6" style="text-align:center;padding:2.5rem"><div class="spinner" style="margin:0 auto"></div></td></tr>';try{const data=await apiGet("/dat/results?page="+currentPage+"&page_size=20&search="+encodeURIComponent(searchQuery));totalPages=data.total_pages;if(data.items.length===0){document.querySelector(".table-container").style.display="none";document.getElementById("emptyState").style.display="block";document.getElementById("pagination").innerHTML="";return;}document.querySelector(".table-container").style.display="block";document.getElementById("emptyState").style.display="none";tbody.innerHTML=data.items.map(r=>'<tr><td style="color:var(--text-muted)">'+r.id+'</td><td>'+r.username+'</td><td style="color:var(--text-secondary);font-size:0.8125rem">'+new Date(r.create_time).toLocaleString(t("date.locale"))+'</td><td><strong>'+r.dat_score+'</strong></td><td>'+r.effective_num+'/10</td><td><a href="/result?id='+r.id+'" class="btn btn-ghost" style="padding:0.25rem 0.5rem;font-size:0.8125rem">'+t("results.view_btn")+'</a></td></tr>').join("");renderPagination();}catch(e){tbody.innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--error);padding:2rem">'+t("results.load_failed")+'</td></tr>';}}
function renderPagination(){const pag=document.getElementById("pagination");let html='<button onclick="goPage('+(currentPage-1)+')" '+(currentPage<=1?"disabled":"")+'><i class="ph ph-caret-left"></i></button>';for(let p=1;p<=totalPages;p++){if(totalPages>15&&p>3&&p<totalPages-2&&p!==currentPage&&Math.abs(p-currentPage)>2){if(p===4)html+='<button disabled>...</button>';continue;}html+='<button class="'+(p===currentPage?"active":"")+'" onclick="goPage('+p+')">'+p+'</button>';}html+='<button onclick="goPage('+(currentPage+1)+')" '+(currentPage>=totalPages?"disabled":"")+'><i class="ph ph-caret-right"></i></button>';pag.innerHTML=html;}
function goPage(p){if(p<1||p>totalPages)return;currentPage=p;loadResults();}
function searchRecords(){searchQuery=document.getElementById("searchInput").value.trim();currentPage=1;loadResults();}
document.getElementById("searchInput")?.addEventListener("keypress",e=>{if(e.key==="Enter")searchRecords();});
init();
</script></body></html>
