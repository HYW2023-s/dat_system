<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DAT 测试 - DAT System</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
  <script src="/js/api.js"></script>
</head>
<body>
  <nav id="navbar" class="navbar"></nav>

  <div class="page-container" style="padding-top:2rem;padding-bottom:3rem">
    <!-- Pre-test state -->
    <div id="pretest">
      <div class="card" style="text-align:center;max-width:600px;margin:2rem auto">
        <div style="font-size:3rem;color:var(--accent);margin-bottom:1rem">
          <i class="ph ph-timer"></i>
        </div>
        <h1 style="font-size:1.5rem;margin-bottom:0.5rem">DAT 发散性思维测试</h1>
        <p class="text-muted mb-4">
          请在 <strong id="pretestTime">4分钟</strong> 内输入<strong>10个互不相关的名词</strong>
        </p>
        <div class="alert alert-info" style="text-align:left;margin-bottom:1.5rem">
          <i class="ph ph-info"></i> 提示：词汇差异越大越好。请确保输入的是名词，不要输入动词或形容词。
        </div>
        <button class="btn btn-primary" onclick="startTest()" style="font-size:1rem;padding:0.75rem 2.5rem">
          <i class="ph ph-play"></i> 开始作答
        </button>
      </div>
    </div>

    <!-- Test state -->
    <div id="testArea" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem">
        <h1 style="font-size:1.25rem">请输入10个互不相关的名词</h1>
        <div>
          <span class="text-muted text-sm">剩余时间：</span>
          <span id="timer" class="timer"></span>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;max-width:800px;margin:0 auto">
        <script>
          for (let i = 1; i <= 10; i++) {
            document.write(`
              <div class="form-group" style="margin-bottom:0">
                <label class="form-label">词 ${i}</label>
                <input type="text" id="word${i}" class="form-input" placeholder="请输入名词..." maxlength="32">
              </div>
            `);
          }
        </script>
      </div>

      <div id="testError" class="alert alert-error" style="display:none;margin-top:1rem;max-width:800px;margin-left:auto;margin-right:auto"></div>

      <div style="text-align:center;margin-top:2rem">
        <button class="btn btn-primary" onclick="submitTest()" style="font-size:1rem;padding:0.75rem 2.5rem">
          <i class="ph ph-check-circle"></i> 提交答案
        </button>
      </div>
    </div>

    <!-- Result state -->
    <div id="resultArea" style="display:none;max-width:800px;margin:0 auto">
      <div class="card" style="text-align:center;margin-bottom:2rem">
        <div class="score-label">DAT 得分</div>
        <div id="scoreDisplay" class="score-display" style="margin:0.5rem 0">-</div>
        <p class="text-muted text-sm">
          有效词汇数：<strong id="effectiveNum">0</strong> 个 &nbsp;|&nbsp;
          超越了 <strong id="percentage">0</strong>% 的用户
        </p>
      </div>

      <div class="card" style="text-align:center">
        <h2 class="card-header" style="display:flex;align-items:center;justify-content:center;gap:0.5rem">
          <i class="ph ph-chart-scatter" style="color:var(--accent)"></i> 语义距离热力图
        </h2>
        <div id="heatmapContainer">
          <img id="heatmapImage" class="heatmap-image" alt="语义距离热力图" style="margin-top:1rem">
        </div>
        <p id="noHeatmap" class="text-muted text-sm mt-4" style="display:none">
          有效词汇不足5个，无法生成热力图
        </p>
      </div>

      <div style="text-align:center;margin-top:2rem;display:flex;gap:1rem;justify-content:center">
        <button class="btn btn-secondary" onclick="retryTest()">
          <i class="ph ph-arrow-counter-clockwise"></i> 重新测试
        </button>
        <a href="/results" class="btn btn-ghost">
          <i class="ph ph-list-numbers"></i> 查看历史记录
        </a>
      </div>
    </div>
  </div>

  <script>
    let timerInterval = null;
    let timeLeft = 240;
    let limitedTime = 240;
    let startTime = null;

    if (!requireAuth()) {}

    async function init() {
      renderNavbar("test");
      try {
        const config = await apiGet("/dat/test-config");
        limitedTime = config.limited_time || 240;
        timeLeft = limitedTime;
        const mins = Math.floor(limitedTime / 60);
        const secs = limitedTime % 60;
        document.getElementById("pretestTime").textContent =
          `${mins}分${secs > 0 ? secs + "秒" : ""}`;
      } catch (err) {
        showToast("获取配置失败", "error");
      }
    }

    function startTest() {
      document.getElementById("pretest").style.display = "none";
      document.getElementById("testArea").style.display = "block";
      startTime = Date.now();
      updateTimer();
      timerInterval = setInterval(updateTimer, 1000);
    }

    function updateTimer() {
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      timeLeft = limitedTime - elapsed;

      const timerEl = document.getElementById("timer");
      const mins = Math.floor(Math.max(0, timeLeft) / 60);
      const secs = Math.max(0, timeLeft) % 60;
      timerEl.textContent = `${mins}:${String(secs).padStart(2, "0")}`;

      timerEl.className = "timer";
      if (timeLeft <= 30) timerEl.classList.add("danger");
      else if (timeLeft <= 60) timerEl.classList.add("warning");

      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        showToast("时间到，自动提交", "info");
        submitTest();
      }
    }

    async function submitTest() {
      clearInterval(timerInterval);

      const words = {};
      let hasInput = false;
      for (let i = 1; i <= 10; i++) {
        words[`word${i}`] = document.getElementById(`word${i}`).value.trim();
        if (words[`word${i}`]) hasInput = true;
      }

      if (!hasInput) {
        document.getElementById("testError").textContent = "请至少输入一个词汇";
        document.getElementById("testError").style.display = "block";
        timerInterval = setInterval(updateTimer, 1000);
        return;
      }

      document.getElementById("testArea").style.display = "none";
      document.getElementById("pretest").style.display = "none";

      const resultDiv = document.getElementById("resultArea");
      resultDiv.style.display = "block";
      resultDiv.innerHTML = `
        <div style="text-align:center;padding:4rem">
          <div class="spinner" style="margin:0 auto 1rem"></div>
          <p class="text-muted">正在计算得分...</p>
        </div>
      `;

      try {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const data = {
          ...words,
          spend_time: String(elapsed),
          limited_time: String(limitedTime),
        };

        const result = await apiPost("/dat/calculate", data);
        displayResult(result);
      } catch (err) {
        resultDiv.innerHTML = `
          <div class="alert alert-error" style="text-align:center">
            <p>计算失败：${err.message}</p>
            <button class="btn btn-secondary mt-4" onclick="retryTest()">重新测试</button>
          </div>
        `;
      }
    }

    function displayResult(result) {
      document.getElementById("resultArea").innerHTML = `
        <div class="card" style="text-align:center;margin-bottom:2rem">
          <div class="score-label">DAT 得分</div>
          <div class="score-display" style="margin:0.5rem 0">${result.dat_score}</div>
          <p class="text-muted text-sm">
            有效词汇数：<strong>${result.effective_num}</strong> 个 &nbsp;|&nbsp;
            超越了 <strong>${result.percentage}</strong>% 的用户
          </p>
        </div>

        <div class="card" style="text-align:center">
          <h2 class="card-header" style="display:flex;align-items:center;justify-content:center;gap:0.5rem">
            <i class="ph ph-chart-scatter" style="color:var(--accent)"></i> 语义距离热力图
          </h2>
          <div id="heatmapContainer">
            ${result.picture_path && !result.picture_path.includes("tips.jpg")
              ? `<img src="${result.picture_path}" class="heatmap-image" alt="语义距离热力图" style="margin-top:1rem">`
              : `<p class="text-muted text-sm mt-4">有效词汇不足5个，无法生成热力图</p>`
            }
          </div>
        </div>

        <div style="text-align:center;margin-top:2rem;display:flex;gap:1rem;justify-content:center">
          <button class="btn btn-secondary" onclick="retryTest()">
            <i class="ph ph-arrow-counter-clockwise"></i> 重新测试
          </button>
          <a href="/results" class="btn btn-ghost">
            <i class="ph ph-list-numbers"></i> 查看历史记录
          </a>
        </div>
      `;
    }

    function retryTest() {
      window.location.reload();
    }

    init();
  </script>
</body>
</html>
